<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Двадцатка | Мир D&D для новичков</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0c10;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            color: #ece8e1;
            line-height: 1.5;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 24px;
            width: 100%;
        }

        .header {
            background: url('shapka.jpg') center/cover no-repeat;
            border-bottom: 2px solid #8b0000;
            padding: 20px 0;
            position: relative;
            width: 100%;
            background-size: cover;
            background-position: center;
        }
        
        .header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.55);
            z-index: 1;
        }
        
        .header-inner {
            position: relative;
            z-index: 2;
            display: flex;
            align-items: center;
            gap: 24px;
            flex-wrap: wrap;
        }

        .logo-block img {
            width: 65px;
            height: auto;
            display: block;
            border-radius: 10px;
            background: #0a0c10;
            box-shadow: 0 0 0 1px #8b0000, 0 0 0 3px #1f1f1f;
        }

        .site-title-block img {
            height: 55px;
            width: auto;
            display: block;
            filter: drop-shadow(0 0 4px rgba(0,0,0,0.5));
        }

        .nav-bar {
            background: #0f0f13;
            border-bottom: 1px solid #2c1a1a;
            padding: 0;
            margin: 0;
        }
        
        .button-group {
            display: flex;
            flex-wrap: wrap;
            gap: 2px;
            list-style: none;
            margin: 0;
            padding: 0;
        }
        
        .dnd-btn {
            background: transparent;
            border: none;
            color: #b4a88a;
            padding: 14px 20px;
            font-weight: 500;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
            letter-spacing: 0.3px;
        }
        
        .dnd-btn:hover {
            color: #ffffff;
            background: rgba(139, 0, 0, 0.3);
        }
        
        .dnd-btn.active {
            color: #ffffff;
            border-bottom: 2px solid #8b0000;
        }

        .two-columns {
            display: flex;
            gap: 40px;
            flex-wrap: wrap;
        }
        .main-content {
            flex: 2;
            min-width: 250px;
        }
        .sidebar {
            flex: 1;
            min-width: 240px;
        }

        .ready-characters {
            background: #0e0c12;
            border-radius: 12px;
            padding: 20px;
            border: 1px solid #2c1a1a;
            margin-top: 0;
        }
        .ready-characters h3 {
            color: #c0392b;
            margin-bottom: 16px;
            font-size: 1.1rem;
            font-weight: 600;
            letter-spacing: 0.5px;
        }
        .ready-characters ul {
            list-style: none;
        }
        .ready-characters li {
            padding: 10px 0;
            border-bottom: 1px solid #1e1a1c;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.95rem;
            color: #dbd0bc;
        }
        .ready-characters li:hover {
            color: #c0392b;
            padding-left: 8px;
        }

        .content-panel {
            background: #0e0c12;
            border-radius: 12px;
            padding: 28px 28px;
            margin: 40px 0;
            border: 1px solid #2c1a1a;
            border-left: 2px solid #a52a2a;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }
        .page-title {
            color: #c0392b;
            font-size: 1.5rem;
            border-bottom: 1px solid #2c1a1a;
            padding-bottom: 12px;
            margin-bottom: 24px;
            font-weight: 500;
            letter-spacing: -0.3px;
        }
        .page-content-text {
            font-size: 0.95rem;
            line-height: 1.6;
            color: #dbd0bc;
        }

        .filter-bar {
            background: #0f0f13;
            border-radius: 8px;
            padding: 8px;
            margin-bottom: 24px;
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            border: 1px solid #2c1a1a;
        }
        .filter-btn {
            background: transparent;
            border: none;
            color: #b4a88a;
            padding: 6px 16px;
            font-size: 0.8rem;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }
        .filter-btn:hover {
            background: #1e1a1c;
            color: #ece8e1;
        }
        .filter-btn.active {
            background: #8b0000;
            color: #ffffff;
        }

        .items-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 24px;
            margin-top: 20px;
        }
        .item-card {
            background: #0f0f13;
            border: 1px solid #2c1a1a;
            border-radius: 10px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .item-card:hover {
            transform: translateY(-3px);
            border-color: #8b0000;
            box-shadow: 0 6px 16px rgba(139, 0, 0, 0.2);
        }
        .item-image {
            width: 100%;
            height: 220px;
            object-fit: contain;
            background: #0a0c10;
            padding: 16px;
            display: block;
        }
        .item-name {
            background: #0f0f13;
            padding: 14px;
            text-align: center;
            font-size: 1.1rem;
            font-weight: 500;
            color: #c0392b;
            border-top: 1px solid #2c1a1a;
        }
        .item-description {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.35s ease-out;
            background: #0a0c10;
            padding: 0 14px;
        }
        .item-description.show {
            max-height: 380px;
            padding: 14px;
            border-top: 1px solid #2c1a1a;
        }
        .item-description p {
            margin: 6px 0;
            color: #dbd0bc;
            line-height: 1.5;
            font-size: 0.85rem;
        }
        .item-description strong {
            color: #c0392b;
            font-weight: 600;
        }

        .contacts-info {
            background: #0f0f13;
            padding: 24px;
            border-radius: 10px;
            margin-top: 16px;
            border: 1px solid #2c1a1a;
        }
        .contacts-info p {
            margin: 12px 0;
        }
        .contacts-info a {
            color: #c0392b;
            text-decoration: none;
        }
        .contacts-info a:hover {
            text-decoration: underline;
        }

        .hero-section {
            margin: 40px 0 30px;
        }
        .hero-card {
            background: #0f0f13;
            border-radius: 12px;
            border: 1px solid #2c1a1a;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .hero-image {
            max-width: 100%;
            max-height: 380px;
            width: auto;
            height: auto;
            border-radius: 8px;
            display: block;
            object-fit: contain;
        }

        footer {
            text-align: center;
            padding: 28px 0 24px;
            border-top: 1px solid #2c1a1a;
            margin-top: 20px;
            color: #7a6a5c;
            font-size: 0.75rem;
        }

        @media (max-width: 900px) {
            .two-columns {
                flex-direction: column;
            }
        }
        @media (max-width: 750px) {
            .header-inner {
                justify-content: center;
                text-align: center;
            }
            .dnd-btn {
                padding: 10px 14px;
                font-size: 0.75rem;
            }
            .items-grid {
                grid-template-columns: 1fr;
            }
            .hero-image {
                max-height: 200px;
            }
        }
    </style>
</head>
<body>

<header class="header">
    <div class="container header-inner">
        <div class="logo-block">
            <img src="d20.png" alt="Логотип Двадцатка">
        </div>
        <div class="site-title-block">
            <img src="naming.png" alt="Двадцатка">
        </div>
    </div>
</header>

<div class="nav-bar">
    <div class="container">
        <ul class="button-group">
            <li><button class="dnd-btn" data-section="home">ГЛАВНАЯ</button></li>
            <li><button class="dnd-btn" data-section="newbie">НОВИЧКАМ</button></li>
            <li><button class="dnd-btn" data-section="classes">КЛАССЫ</button></li>
            <li><button class="dnd-btn" data-section="races">РАСЫ</button></li>
            <li><button class="dnd-btn" data-section="contacts">КОНТАКТЫ</button></li>
        </ul>
    </div>
</div>

<main class="container">
    <div class="content-panel" id="dynamicContent"></div>

    <div class="hero-section">
        <div class="hero-card">
            <img src="info.png" alt="D&D информация" class="hero-image">
        </div>
    </div>
</main>

<footer>
    <p>© 2026 «Двадцатка» - твой критический успех в мире D&D. Помощь новичкам и опытным искателям приключений.</p>
</footer>

<script>
    const contentContainer = document.getElementById('dynamicContent');

    const classesData = [
        {
            name: "ВАРВАР",
            img: "varvar.png",
            role: "tank",
            description: "<strong>Варвар</strong> - воин, чья сила рождается в ярости.<br><br><strong>Особенности:</strong> «Ярость» даёт преимущество на силовые броски и сопротивление урону. Кость хитов d12.<br><br><strong>Для новичков:</strong> Простой и выносливый класс, отличный выбор для первого персонажа."
        },
        {
            name: "ПАЛАДИН",
            img: "паладин.png",
            role: "tank",
            description: "<strong>Паладин</strong> - священный воин, следующий клятве.<br><br><strong>Особенности:</strong> Накладывает заклинания, исцеляет и наносит огромный урон одной цели через «Божественную кару».<br><br><strong>Для новичков:</strong> Хороший баланс между атакой, защитой и поддержкой."
        },
        {
            name: "ПЛУТ",
            img: "plut.png",
            role: "damage",
            description: "<strong>Плут</strong> - скрытный и смертоносный специалист.<br><br><strong>Особенности:</strong> «Скрытая атака» наносит дополнительные 2к6 урона при преимуществе. Экспертиза в навыках.<br><br><strong>Для новичков:</strong> Любишь быть незаметным и бить со спины? Плут - твой выбор."
        },
        {
            name: "ВОЛШЕБНИК",
            img: "volshebnik.png",
            role: "damage",
            description: "<strong>Волшебник</strong> - мастер заклинаний, черпающий силу из книг.<br><br><strong>Особенности:</strong> Может выучить больше всего заклинаний. Восстанавливает часть ячеек после короткого отдыха.<br><br><strong>Для новичков:</strong> Сложный, но гибкий класс. Рекомендуется школа волшебства «Эвокация»."
        },
        {
            name: "БАРД",
            img: "bard.png",
            role: "support",
            description: "<strong>Бард</strong> - вдохновляющий артист и лицо партии.<br><br><strong>Особенности:</strong> «Вдохновение барда» даёт союзникам бонус к броскам. Магия барда разнообразна.<br><br><strong>Для новичков:</strong> Отличный класс для тех, кто хочет много общаться и помогать команде."
        }
    ];

    const racesData = [
        {
            name: "ЛЮДИ",
            img: "lud.png",
            role: "all",
            description: "<strong>Люди</strong> - самые амбициозные и приспосабливаемые.<br><br><strong>Особенности:</strong> +1 ко всем характеристикам или +1 к двум любым + навык.<br><br><strong>Для новичков:</strong> Универсальная раса, подходит под любой класс."
        },
        {
            name: "ЭЛЬФЫ",
            img: "elf.png",
            role: "damage",
            description: "<strong>Эльфы</strong> - древний народ, близкий к магии.<br><br><strong>Особенности:</strong> Транс (4 часа медитации), преимущество против очарования, владение длинным луком.<br><br><strong>Для новичков:</strong> Отлично подходят для магов, плутов и следопытов."
        },
        {
            name: "ДВОРФЫ",
            img: "dworrf.png",
            role: "tank",
            description: "<strong>Дворфы</strong> - выносливые горные мастера.<br><br><strong>Особенности:</strong> +2 к Телосложению, устойчивость к яду, владение боевыми топорами.<br><br><strong>Для новичков:</strong> Идеальны для воинов, жрецов и паладинов."
        },
        {
            name: "ПОЛУРОСЛИКИ",
            img: "polurosl.png",
            role: "support",
            description: "<strong>Полурослики (Халфлинги)</strong> - удачливые маленькие народцы.<br><br><strong>Особенности:</strong> «Удача» - переброс единицы на d20. Преимущество против испуга.<br><br><strong>Для новичков:</strong> Везение спасает в критических ситуациях. Хороши для плутов и бардов."
        }
    ];

    let currentClassFilter = "all";
    let currentRaceFilter = "all";

    function renderNewbiePage() {
        return `
            <div class="two-columns">
                <div class="main-content">
                    <h2 class="page-title">НОВИЧКАМ: КАК СОЗДАТЬ ПЕРСОНАЖА</h2>
                    <div class="page-content-text">
                        <p>Создание персонажа в D&D - это просто. Следуй инструкции:</p>
                        <ol style="margin-left: 22px; margin-top: 16px; margin-bottom: 20px;">
                            <li><strong>Выбери расу</strong> - кто ты по происхождению</li>
                            <li><strong>Выбери класс</strong> - чем ты занимаешься</li>
                            <li><strong>Распредели характеристики</strong> - Сила, Ловкость, Телосложение, Интеллект, Мудрость, Харизма</li>
                            <li><strong>Выбери навыки и снаряжение</strong> - что умеешь и с чем идёшь в бой</li>
                            <li><strong>Заполни лист персонажа</strong> - ниже пример для ориентира</li>
                        </ol>
                        <div style="text-align: center; margin: 20px 0;">
                            <img src="list.png" alt="Лист персонажа D&D" style="max-width: 100%; border-radius: 8px; border: 1px solid #2c1a1a;">
                        </div>
                    </div>
                </div>
                <div class="sidebar">
                    <div class="ready-characters">
                        <h3>ГОТОВЫЕ ПЕРСОНАЖИ</h3>
                        <ul>
                            <li onclick="window.open('paladin.pdf', '_blank')">ПАЛАДИН</li>
                            <li onclick="window.open('varvar.pdf', '_blank')">ВАРВАР</li>
                            <li onclick="window.open('plut.pdf', '_blank')">ПЛУТ</li>
                            <li onclick="window.open('bard.pdf', '_blank')">БАРД</li>
                            <li onclick="window.open('volshebnik.pdf', '_blank')">ВОЛШЕБНИК</li>
                        </ul>
                    </div>
                </div>
            </div>
        `;
    }

    function renderHomePage() {
        return `
            <div class="two-columns">
                <div class="main-content">
                    <h2 class="page-title">ДОБРО ПОЖАЛОВАТЬ В «ДВАДЦАТКУ»</h2>
                    <div class="page-content-text">
                        <p>Здесь вы найдёте всю необходимую информацию для новичков о игре Dungeons & Dragons (D&D).</p>
                        <p>Мы помогаем сделать первый шаг в мир фэнтези, где кубик d20 решает судьбы героев.</p>
                    </div>
                </div>
                <div class="sidebar">
                    <div class="ready-characters">
                        <h3>ГОТОВЫЕ ПЕРСОНАЖИ</h3>
                        <ul>
                            <li onclick="window.open('paladin.pdf', '_blank')">ПАЛАДИН</li>
                            <li onclick="window.open('varvar.pdf', '_blank')">ВАРВАР</li>
                            <li onclick="window.open('plut.pdf', '_blank')">ПЛУТ</li>
                            <li onclick="window.open('bard.pdf', '_blank')">БАРД</li>
                            <li onclick="window.open('volshebnik.pdf', '_blank')">ВОЛШЕБНИК</li>
                        </ul>
                    </div>
                </div>
            </div>
        `;
    }

    function renderClassesPage() {
        let filteredData = classesData;
        if (currentClassFilter !== "all") {
            filteredData = classesData.filter(item => item.role === currentClassFilter);
        }

        let html = `<h2 class="page-title">КЛАССЫ ПЕРСОНАЖЕЙ</h2>
                    <div class="filter-bar">
                        <button class="filter-btn ${currentClassFilter === "all" ? "active" : ""}" data-filter="all">ВСЕ</button>
                        <button class="filter-btn ${currentClassFilter === "tank" ? "active" : ""}" data-filter="tank">ТАНК</button>
                        <button class="filter-btn ${currentClassFilter === "damage" ? "active" : ""}" data-filter="damage">УРОН</button>
                        <button class="filter-btn ${currentClassFilter === "support" ? "active" : ""}" data-filter="support">ПОДДЕРЖКА</button>
                    </div>
                    <div class="items-grid" id="classes-grid">`;
        
        filteredData.forEach((item, idx) => {
            html += `
                <div class="item-card" data-type="class" data-index="${idx}">
                    <img src="${item.img}" alt="${item.name}" class="item-image" onerror="this.src='https://placehold.co/400x300/0f0f13/8b0000?text=${encodeURIComponent(item.name)}'">
                    <div class="item-name">${item.name}</div>
                    <div class="item-description" id="class-desc-${idx}"><p>${item.description}</p></div>
                </div>
            `;
        });
        html += `</div>`;
        return html;
    }

    function renderRacesPage() {
        let filteredData = racesData;
        if (currentRaceFilter !== "all") {
            filteredData = racesData.filter(item => item.role === currentRaceFilter);
        }

        let html = `<h2 class="page-title">РАСЫ D&D</h2>
                    <div class="filter-bar">
                        <button class="filter-btn ${currentRaceFilter === "all" ? "active" : ""}" data-filter="all">ВСЕ</button>
                        <button class="filter-btn ${currentRaceFilter === "tank" ? "active" : ""}" data-filter="tank">ТАНК</button>
                        <button class="filter-btn ${currentRaceFilter === "damage" ? "active" : ""}" data-filter="damage">УРОН</button>
                        <button class="filter-btn ${currentRaceFilter === "support" ? "active" : ""}" data-filter="support">ПОДДЕРЖКА</button>
                        <button class="filter-btn ${currentRaceFilter === "all" ? "active" : ""}" data-filter="all">УНИВЕРСАЛЫ</button>
                    </div>
                    <div class="items-grid" id="races-grid">`;
        
        filteredData.forEach((item, idx) => {
            html += `
                <div class="item-card" data-type="race" data-index="${idx}">
                    <img src="${item.img}" alt="${item.name}" class="item-image" onerror="this.src='https://placehold.co/400x300/0f0f13/8b0000?text=${encodeURIComponent(item.name)}'">
                    <div class="item-name">${item.name}</div>
                    <div class="item-description" id="race-desc-${idx}"><p>${item.description}</p></div>
                </div>
            `;
        });
        html += `</div>`;
        return html;
    }

    function renderContactsPage() {
        return `
            <h2 class="page-title">КОНТАКТЫ</h2>
            <div class="contacts-info">
                <p><strong>Telegram:</strong> <a href="https://t.me/nick_Juice" target="_blank">https://t.me/nick_Juice</a></p>
                <p><strong>MAX:</strong> <a href="http://6max.ru/nick_juice" target="_blank">http://6max.ru/nick_juice</a></p>
                <p><strong>ВК:</strong> <a href="https://vk.ru/nick_juice" target="_blank">https://vk.ru/nick_juice</a></p>
            </div>
        `;
    }

    function attachCardHandlers() {
        document.querySelectorAll('.item-card[data-type="class"]').forEach(card => {
            const idx = card.getAttribute('data-index');
            const descDiv = document.getElementById(`class-desc-${idx}`);
            if (descDiv) {
                card.removeEventListener('click', card.clickHandler);
                card.clickHandler = (e) => {
                    if (e.target.closest('.item-description')) return;
                    document.querySelectorAll('.item-description').forEach(desc => {
                        if (desc !== descDiv) desc.classList.remove('show');
                    });
                    descDiv.classList.toggle('show');
                };
                card.addEventListener('click', card.clickHandler);
            }
        });
        document.querySelectorAll('.item-card[data-type="race"]').forEach(card => {
            const idx = card.getAttribute('data-index');
            const descDiv = document.getElementById(`race-desc-${idx}`);
            if (descDiv) {
                card.removeEventListener('click', card.clickHandler);
                card.clickHandler = (e) => {
                    if (e.target.closest('.item-description')) return;
                    document.querySelectorAll('.item-description').forEach(desc => {
                        if (desc !== descDiv) desc.classList.remove('show');
                    });
                    descDiv.classList.toggle('show');
                };
                card.addEventListener('click', card.clickHandler);
            }
        });
    }

    function attachFilterHandlers(sectionId) {
        const filterBtns = document.querySelectorAll('.filter-btn');
        filterBtns.forEach(btn => {
            btn.removeEventListener('click', filterHandler);
            btn.addEventListener('click', filterHandler);
        });

        function filterHandler(e) {
            const filterValue = e.currentTarget.getAttribute('data-filter');
            if (sectionId === 'classes') {
                currentClassFilter = filterValue;
                const newHtml = renderClassesPage();
                const tempDiv = document.createElement('div');
                tempDiv.innerHTML = newHtml;
                const newGrid = tempDiv.querySelector('.items-grid');
                const oldGrid = document.querySelector('.items-grid');
                if (oldGrid && newGrid) {
                    oldGrid.outerHTML = newGrid.outerHTML;
                }
                const newFilterBar = tempDiv.querySelector('.filter-bar');
                const oldFilterBar = document.querySelector('.filter-bar');
                if (oldFilterBar && newFilterBar) {
                    oldFilterBar.outerHTML = newFilterBar.outerHTML;
                }
                attachCardHandlers();
                attachFilterHandlers('classes');
            } else if (sectionId === 'races') {
                currentRaceFilter = filterValue;
                const newHtml = renderRacesPage();
                const tempDiv = document.createElement('div');
                tempDiv.innerHTML = newHtml;
                const newGrid = tempDiv.querySelector('.items-grid');
                const oldGrid = document.querySelector('.items-grid');
                if (oldGrid && newGrid) {
                    oldGrid.outerHTML = newGrid.outerHTML;
                }
                const newFilterBar = tempDiv.querySelector('.filter-bar');
                const oldFilterBar = document.querySelector('.filter-bar');
                if (oldFilterBar && newFilterBar) {
                    oldFilterBar.outerHTML = newFilterBar.outerHTML;
                }
                attachCardHandlers();
                attachFilterHandlers('races');
            }
        }
    }

    function showPage(sectionId, skipScroll = false) {
        let html = '';
        switch(sectionId) {
            case 'home':
                html = renderHomePage();
                break;
            case 'newbie':
                html = renderNewbiePage();
                break;
            case 'classes':
                html = renderClassesPage();
                break;
            case 'races':
                html = renderRacesPage();
                break;
            case 'contacts':
                html = renderContactsPage();
                break;
            default:
                html = renderHomePage();
        }
        contentContainer.innerHTML = html;
        
        if (sectionId === 'classes' || sectionId === 'races') {
            setTimeout(() => {
                attachCardHandlers();
                attachFilterHandlers(sectionId);
            }, 10);
        }
        
        if (!skipScroll) {
            document.getElementById('dynamicContent').scrollIntoView({ behavior: 'smooth', block: 'start' });
        }
    }

    const btns = document.querySelectorAll('.dnd-btn');
    btns.forEach(btn => {
        btn.addEventListener('click', () => {
            const section = btn.getAttribute('data-section');
            btns.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            showPage(section);
        });
    });

    showPage('home');
</script>
</body>
</html>
